- scrDashboard As screen:
    Fill: =RGBA(245, 245, 245, 1)
    OnVisible: |-
        =ClearCollect(
            colUseCases,
            SortByColumns(
                'ai_UseCase',
                "ai_totalscore",
                Descending
            )
        )

    # ── Header bar ──────────────────────────────────────────────
    - recHeader As rectangle:
        Fill: =RGBA(128, 0, 0, 1)
        X: =0
        Y: =0
        Width: =App.Width
        Height: =60

    - lblAppTitle As label:
        Text: ="AI Use Case Selection"
        X: =24
        Y: =0
        Width: =400
        Height: =60
        Color: =RGBA(255, 255, 255, 1)
        Size: =18
        FontWeight: =FontWeight.Bold
        VerticalAlign: =VerticalAlign.Middle

    - lblUserName As label:
        Text: =gblCurrentUser.name & " · " & gblCurrentRole
        X: =App.Width - 340
        Y: =0
        Width: =220
        Height: =60
        Color: =RGBA(255, 200, 200, 1)
        Size: =13
        Align: =Align.Right
        VerticalAlign: =VerticalAlign.Middle

    - ddlRoleSelector As dropdown:
        Items: =colRoles
        X: =App.Width - 180
        Y: =15
        Width: =160
        Height: =30
        OnChange: =Set(gblCurrentRole, ddlRoleSelector.Selected.Value)

    - btnNavProfile As button:
        Text: ="Client Profile"
        X: =App.Width - 480
        Y: =15
        Width: =130
        Height: =30
        Fill: =RGBA(100, 0, 0, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =6
        OnSelect: =Navigate(scrClientProfile, ScreenTransition.Fade)

