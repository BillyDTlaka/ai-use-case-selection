    # ── Use Case gallery ─────────────────────────────────────────
    - galUseCases As gallery.Vertical:
        Items: |-
            =Filter(
                colUseCases,
                (ddlFilterBU.Selected.Value = "All" || ai_businessunit = ddlFilterBU.Selected.Value),
                (ddlFilterDomain.Selected.Value = "All" || ai_domain = ddlFilterDomain.Selected.Value),
                (ddlFilterStatus.Selected.Value = "All" || ai_status = ddlFilterStatus.Selected.Value),
                (ddlFilterRecom.Selected.Value = "All" || ai_recommendation = ddlFilterRecom.Selected.Value)
