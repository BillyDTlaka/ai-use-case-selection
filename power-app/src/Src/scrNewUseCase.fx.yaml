- scrNewUseCase As screen:
    Fill: =RGBA(245, 245, 245, 1)

    # ── Header ───────────────────────────────────────────────────
    - recHeader As rectangle:
        Fill: =RGBA(128, 0, 0, 1)
        X: =0
        Y: =0
        Width: =App.Width
        Height: =60

    - btnBack As button:
        Text: ="← Dashboard"
        X: =16
        Y: =15
        Width: =140
        Height: =30
        Fill: =RGBA(100, 0, 0, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =6
        OnSelect: =Navigate(scrDashboard, ScreenTransition.Fade)

    - lblPageTitle As label:
        Text: ="New Use Case"
        X: =170
        Y: =0
        Width: =300
        Height: =60
        Color: =RGBA(255, 255, 255, 1)
        Size: =18
        FontWeight: =FontWeight.Bold
        VerticalAlign: =VerticalAlign.Middle

    # ── Warning banner (no client profile) ───────────────────────
    - recWarnBanner As rectangle:
        Fill: =RGBA(255, 251, 235, 1)
        X: =24
        Y: =80
        Width: =App.Width - 48
        Height: =44
        RadiusTopLeft: =8
        RadiusTopRight: =8
        RadiusBottomLeft: =8
        RadiusBottomRight: =8
        Visible: =IsBlank(gblActiveClientId)

    - lblWarnText As label:
        Text: ="⚠  No client profile selected. Set one up first."
        X: =40
        Y: =80
        Width: =500
        Height: =44
        Size: =13
        Color: =RGBA(146, 64, 14, 1)
        VerticalAlign: =VerticalAlign.Middle
        Visible: =IsBlank(gblActiveClientId)

    - btnGoToProfile As button:
        Text: ="Set up profile →"
        X: =App.Width - 200
        Y: =88
        Width: =172
        Height: =28
        Fill: =RGBA(217, 119, 6, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =6
        OnSelect: =Navigate(scrClientProfile, ScreenTransition.Fade)
        Visible: =IsBlank(gblActiveClientId)

    # ── Form card ────────────────────────────────────────────────
    - recFormCard As rectangle:
        Fill: =RGBA(255, 255, 255, 1)
        X: =24
        Y: =140
        Width: =App.Width - 48
        Height: =530
        RadiusTopLeft: =12
        RadiusTopRight: =12
        RadiusBottomLeft: =12
        RadiusBottomRight: =12

    - lblActiveClient As label:
        Text: =If(IsBlank(gblActiveClientId), "No client selected", "Client: " & gblActiveClientName)
        X: =40
        Y: =152
        Width: =500
        Height: =24
        Size: =12
        Color: =If(IsBlank(gblActiveClientId), RGBA(220, 38, 38, 1), RGBA(21, 128, 61, 1))
        FontWeight: =FontWeight.Semibold

    # Title
    - lblTitle As label:
        Text: ="Title *"
        X: =40
        Y: =184
        Width: =200
        Height: =20
        Size: =13
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(55, 65, 81, 1)

    - txtTitle As text:
        Default: =""
        X: =40
        Y: =206
        Width: =App.Width - 112
        Height: =36
        Size: =13
        BorderColor: =RGBA(209, 213, 219, 1)
        FocusedBorderColor: =RGBA(128, 0, 0, 1)
        RadiusTopLeft: =8
        RadiusTopRight: =8
        RadiusBottomLeft: =8
        RadiusBottomRight: =8
        HintText: ="e.g. AI-Powered Claims Triage"

    # Description
    - lblDescription As label:
        Text: ="Description *"
        X: =40
        Y: =256
        Width: =200
        Height: =20
        Size: =13
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(55, 65, 81, 1)

    - txtDescription As text:
        Default: =""
        X: =40
        Y: =278
        Width: =App.Width - 112
        Height: =80
        Size: =13
        Mode: =TextMode.MultiLine
        BorderColor: =RGBA(209, 213, 219, 1)
        FocusedBorderColor: =RGBA(128, 0, 0, 1)
        RadiusTopLeft: =8
        RadiusTopRight: =8
        RadiusBottomLeft: =8
        RadiusBottomRight: =8
        HintText: ="Describe the use case in detail…"

    # Business Objective
    - lblObjective As label:
        Text: ="Business Objective *"
        X: =40
        Y: =372
        Width: =300
        Height: =20
        Size: =13
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(55, 65, 81, 1)

    - txtObjective As text:
        Default: =""
        X: =40
        Y: =394
        Width: =App.Width - 112
        Height: =60
        Size: =13
        Mode: =TextMode.MultiLine
        BorderColor: =RGBA(209, 213, 219, 1)
        FocusedBorderColor: =RGBA(128, 0, 0, 1)
        RadiusTopLeft: =8
        RadiusTopRight: =8
        RadiusBottomLeft: =8
        RadiusBottomRight: =8
        HintText: ="What business outcome does this achieve?"

    # Business Unit / Domain / Workspace dropdowns
    - lblBusinessUnit As label:
        Text: ="Business Unit"
        X: =40
        Y: =468
        Width: =200
        Height: =20
        Size: =13
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(55, 65, 81, 1)

    - ddlBusinessUnit As dropdown:
        Items: =["Claims","Underwriting","Finance","Operations","HR","IT","CX"]
        X: =40
        Y: =490
        Width: =220
        Height: =36

    - lblDomain As label:
        Text: ="Domain"
        X: =276
        Y: =468
        Width: =200
        Height: =20
        Size: =13
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(55, 65, 81, 1)

    - ddlDomain As dropdown:
        Items: =["Fraud","Claims","CX","Operations","Underwriting","Finance","HR","Other"]
        X: =276
        Y: =490
        Width: =220
        Height: =36

    - lblWorkspace As label:
        Text: ="Workspace"
        X: =512
        Y: =468
        Width: =200
        Height: =20
        Size: =13
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(55, 65, 81, 1)

    - ddlWorkspace As dropdown:
        Items: =["Innovation","Core Systems","Digital","Analytics","Infrastructure"]
        X: =512
        Y: =490
        Width: =220
        Height: =36

    # Owner
    - lblOwner As label:
        Text: ="Owner *"
        X: =40
        Y: =542
        Width: =200
        Height: =20
        Size: =13
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(55, 65, 81, 1)

    - txtOwner As text:
        Default: =""
        X: =40
        Y: =564
        Width: =400
        Height: =36
        Size: =13
        BorderColor: =RGBA(209, 213, 219, 1)
        FocusedBorderColor: =RGBA(128, 0, 0, 1)
        RadiusTopLeft: =8
        RadiusTopRight: =8
        RadiusBottomLeft: =8
        RadiusBottomRight: =8
        HintText: ="e.g. Sarah Jones"

    # Submit button
    - btnCreateUseCase As button:
        Text: ="Create Use Case"
        X: =40
        Y: =618
        Width: =180
        Height: =40
        Fill: |-
            =If(
                IsBlank(gblActiveClientId),
                RGBA(156, 163, 175, 1),
                RGBA(128, 0, 0, 1)
            )
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =8
        FontWeight: =FontWeight.Bold
        DisplayMode: |-
            =If(
                IsBlank(gblActiveClientId),
                DisplayMode.Disabled,
                DisplayMode.Edit
            )
        OnSelect: |-
            =If(
                Or(IsBlank(txtTitle.Text), IsBlank(txtDescription.Text), IsBlank(txtObjective.Text), IsBlank(txtOwner.Text)),
                Notify("Please fill in all required fields", NotificationType.Warning),
                With(
                    {
                        newUC: Patch(
                            'ai_UseCase',
                            Defaults('ai_UseCase'),
                            {
                                ai_title: txtTitle.Text,
                                ai_description: txtDescription.Text,
                                ai_businessobjective: txtObjective.Text,
                                ai_businessunit: ddlBusinessUnit.Selected.Value,
                                ai_domain: ddlDomain.Selected.Value,
                                ai_workspace: ddlWorkspace.Selected.Value,
                                ai_owner: txtOwner.Text,
                                ai_status: "DRAFT",
                                ai_createdby: gblCurrentUser.name,
                                'ai_clientprofileid': LookUp('ai_ClientProfile', ai_ClientProfileId = gblActiveClientId)
                            }
                        )
                    },
                    Set(recSelectedUseCase, newUC);
                    Navigate(scrUseCaseDetail, ScreenTransition.Fade)
                )
            )
