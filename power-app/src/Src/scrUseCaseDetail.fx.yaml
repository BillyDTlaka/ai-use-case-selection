- scrUseCaseDetail As screen:
    Fill: =RGBA(245, 245, 245, 1)
    OnVisible: |-
        =ClearCollect(
            colComments,
            SortByColumns(
                Filter('ai_Comment', 'Use Case (ai_Comment)'.ai_UseCaseId = recSelectedUseCase.ai_UseCaseId),
                "createdon",
                Ascending
            )
        );
        Set(recLiveUseCase, LookUp('ai_UseCase', ai_UseCaseId = recSelectedUseCase.ai_UseCaseId));
        Set(gblEditScoreV, recLiveUseCase.ai_scorevalue);
        Set(gblEditScoreF, recLiveUseCase.ai_scorefeasibility);
        Set(gblEditScoreD, recLiveUseCase.ai_scoredata);
        Set(gblEditScoreS, recLiveUseCase.ai_scorespeed);
        Set(gblEditScoreR, recLiveUseCase.ai_scorerisk)

    # ── Header ───────────────────────────────────────────────────
    - recHeader As rectangle:
        Fill: =RGBA(128, 0, 0, 1)
        X: =0
        Y: =0
        Width: =App.Width
        Height: =60

    - btnBack As button:
        Text: ="← Dashboard"
        X: =16
        Y: =15
        Width: =140
        Height: =30
        Fill: =RGBA(100, 0, 0, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =6
        OnSelect: =Navigate(scrDashboard, ScreenTransition.Fade)

    - lblUCTitle As label:
        Text: =recLiveUseCase.ai_title
        X: =170
        Y: =0
        Width: =600
        Height: =60
        Color: =RGBA(255, 255, 255, 1)
        Size: =18
        FontWeight: =FontWeight.Bold
        VerticalAlign: =VerticalAlign.Middle

    # Action buttons (top right)
    - btnAnalyze As button:
        Text: =If(gblAnalyzing, "Analysing…", "Run AI Analysis")
        X: =App.Width - 380
        Y: =14
        Width: =168
        Height: =32
        Fill: =RGBA(128, 0, 0, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =8
        FontWeight: =FontWeight.Semibold
        Visible: =recLiveUseCase.ai_status = "DRAFT"
        DisplayMode: =If(gblAnalyzing, DisplayMode.Disabled, DisplayMode.Edit)
        OnSelect: |-
            =Set(gblAnalyzing, true);
            AnalyzeUseCase.Run(recLiveUseCase.ai_UseCaseId);
            Set(recLiveUseCase, LookUp('ai_UseCase', ai_UseCaseId = recSelectedUseCase.ai_UseCaseId));
            Set(gblAnalyzing, false);
            Notify("AI analysis complete", NotificationType.Success)

    - btnSubmit As button:
        Text: =If(gblSubmitting, "Submitting…", "Submit for Review")
        X: =App.Width - 200
        Y: =14
        Width: =180
        Height: =32
        Fill: =RGBA(29, 78, 216, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =8
        FontWeight: =FontWeight.Semibold
        Visible: =recLiveUseCase.ai_status = "DRAFT" && Not(IsBlank(recLiveUseCase.ai_totalscore))
        DisplayMode: =If(gblSubmitting, DisplayMode.Disabled, DisplayMode.Edit)
        OnSelect: |-
            =Set(gblSubmitting, true);
            SubmitUseCase.Run(recLiveUseCase.ai_UseCaseId, gblCurrentUser.name);
            Set(recLiveUseCase, LookUp('ai_UseCase', ai_UseCaseId = recSelectedUseCase.ai_UseCaseId));
            Set(gblSubmitting, false);
            Notify("Submitted for review", NotificationType.Success)

