        ShowScrollbar: =true

        - recCommentBg As rectangle:
            Fill: =RGBA(249, 250, 251, 1)
            X: =0
            Y: =0
            Width: =Parent.TemplateWidth
            Height: =Parent.TemplateSize - 4
            RadiusTopLeft: =8
            RadiusTopRight: =8
            RadiusBottomLeft: =8
            RadiusBottomRight: =8

        - lblCommentAuthor As label:
            Text: =ThisItem.ai_author
            X: =12
            Y: =8
            Width: =200
            Height: =20
            Size: =13
            FontWeight: =FontWeight.Semibold
            Color: =RGBA(17, 24, 39, 1)

        - lblCommentRole As label:
            Text: =ThisItem.ai_role
            X: =220
            Y: =8
            Width: =100
            Height: =20
            Size: =12
            Color: =RGBA(107, 114, 128, 1)

        - lblCommentTime As label:
            Text: =Text(ThisItem.'Created On', "dd/mm/yyyy hh:mm")
            X: =Parent.TemplateWidth - 160
            Y: =8
            Width: =148
            Height: =20
            Size: =11
            Color: =RGBA(156, 163, 175, 1)
            Align: =Align.Right

        - lblCommentContent As label:
            Text: =ThisItem.ai_content
            X: =12
            Y: =30
            Width: =Parent.TemplateWidth - 24
            Height: =30
            Size: =13
            Color: =RGBA(55, 65, 81, 1)
            VerticalAlign: =VerticalAlign.Top

    # Comment input
    - txtCommentInput As text:
        Default: =""
        X: =40
        Y: =994
        Width: =App.Width - 216
        Height: =36
        Size: =13
        BorderColor: =RGBA(209, 213, 219, 1)
        FocusedBorderColor: =RGBA(128, 0, 0, 1)
        RadiusTopLeft: =8
        RadiusTopRight: =8
        RadiusBottomLeft: =8
        RadiusBottomRight: =8
        HintText: ="Add a comment…"
        Visible: =recLiveUseCase.ai_status <> "APPROVED"

    - btnPostComment As button:
        Text: ="Post"
        X: =App.Width - 168
        Y: =994
        Width: =120
        Height: =36
        Fill: =RGBA(128, 0, 0, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =8
        FontWeight: =FontWeight.Semibold
        Visible: =recLiveUseCase.ai_status <> "APPROVED"
        DisplayMode: =If(IsBlank(txtCommentInput.Text), DisplayMode.Disabled, DisplayMode.Edit)
        OnSelect: |-
            =AddComment.Run(
                recLiveUseCase.ai_UseCaseId,
                txtCommentInput.Text,
                gblCurrentUser.name,
                gblCurrentRole
            );
            Reset(txtCommentInput);
            ClearCollect(
                colComments,
                SortByColumns(
                    Filter('ai_Comment', 'Use Case (ai_Comment)'.ai_UseCaseId = recSelectedUseCase.ai_UseCaseId),
                    "createdon",
                    Ascending
                )
            )
